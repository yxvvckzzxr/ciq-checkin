<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CIQ the 13th 受付</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js"></script>
  <style>
    body {
      font-family: sans-serif;
      background: #1a1a2e;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      box-sizing: border-box;
    }
    h1 { font-size: 24px; margin-bottom: 20px; }
    #camera-container { position: relative; width: 100%; max-width: 500px; }
    #video { width: 100%; border-radius: 12px; border: 3px solid #444; }
    #canvas { display: none; }
    #result {
      margin-top: 20px;
      width: 100%;
      max-width: 500px;
      padding: 20px;
      border-radius: 12px;
      text-align: center;
      font-size: 20px;
      display: none;
    }
    #result.success { background: #1b5e20; border: 2px solid #4caf50; }
    #result.error { background: #b71c1c; border: 2px solid #ef5350; }
    #result.already { background: #e65100; border: 2px solid #ff9800; }
    .name { font-size: 28px; font-weight: bold; margin: 10px 0; }
    .number { font-size: 18px; color: #aaa; }
    #reset-btn {
      margin-top: 20px;
      padding: 12px 32px;
      font-size: 18px;
      background: #444;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      display: none;
    }
    #reset-btn:hover { background: #666; }
    #scanning-text { margin-top: 12px; color: #aaa; font-size: 14px; }
  </style>
</head>
<body>
  <h1>CIQ the 13th 受付</h1>
  <div id="camera-container">
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>
  </div>
  <p id="scanning-text">QRコードをカメラにかざしてください</p>
  <div id="result"></div>
  <button id="reset-btn" onclick="resetScanner()">次の人へ</button>

  <script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbxUODC2F-hbGRvkOZ2EN-XRpatzJOgEwQiZxNvEZ_TFppXrgKN8rd7RcHHdEq9ZX2KW3A/exec';

    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const resultDiv = document.getElementById('result');
    const resetBtn = document.getElementById('reset-btn');
    const scanningText = document.getElementById('scanning-text');
    let scanning = true;

    navigator.mediaDevices.getUserMedia({ video: true })
      .then(stream => {
        video.srcObject = stream;
        video.play();
        requestAnimationFrame(scanFrame);
      })
      .catch(err => {
        scanningText.textContent = 'カメラの起動に失敗しました: ' + err.message;
      });

    function scanFrame() {
      if (!scanning) return;
      if (video.readyState === video.HAVE_ENOUGH_DATA) {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const code = jsQR(imageData.data, imageData.width, imageData.height);
        if (code) {
          scanning = false;
          scanningText.textContent = '読み取り中...';
          processQR(code.data);
        }
      }
      requestAnimationFrame(scanFrame);
    }

    function processQR(uuid) {
      fetch(GAS_URL + '?uuid=' + encodeURIComponent(uuid))
        .then(res => res.json())
        .then(result => showResult(result))
        .catch(err => showError(err));
    }

    function showResult(result) {
      resultDiv.style.display = 'block';
      resetBtn.style.display = 'inline-block';
      scanningText.style.display = 'none';

      if (result.status === 'success') {
        resultDiv.className = 'success';
        resultDiv.innerHTML = `
          <div>✅ 受付完了</div>
          <div class="name">${result.familyName} ${result.firstName}</div>
          <div class="number">受付番号 ${result.entryNumber}</div>
        `;
      } else if (result.status === 'already') {
        resultDiv.className = 'already';
        resultDiv.innerHTML = `
          <div>⚠️ 受付済み</div>
          <div class="name">${result.familyName} ${result.firstName}</div>
          <div class="number">受付番号 ${result.entryNumber}</div>
        `;
      } else {
        resultDiv.className = 'error';
        resultDiv.innerHTML = `<div>❌ 該当者が見つかりません</div>`;
      }
    }

    function showError(err) {
      resultDiv.style.display = 'block';
      resultDiv.className = 'error';
      resultDiv.innerHTML = `<div>❌ エラーが発生しました</div>`;
      resetBtn.style.display = 'inline-block';
      scanningText.style.display = 'none';
    }

    function resetScanner() {
      resultDiv.style.display = 'none';
      resetBtn.style.display = 'none';
      scanningText.style.display = 'block';
      scanningText.textContent = 'QRコードをカメラにかざしてください';
      scanning = true;
      requestAnimationFrame(scanFrame);
    }
  </script>
</body>
</html>
